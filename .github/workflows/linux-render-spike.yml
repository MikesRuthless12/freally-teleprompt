# Linux render spike — a TEMPORARY diagnostic, not part of the gate.
#
# The question: on a headless Linux runner the app starts, stays healthy, logs
# nothing, and the only X window that ever exists is GTK's 10x10 leader window.
# The real toplevel never appears. Four fixes (WebKit sandbox off, DMA-BUF
# renderer off, a window manager, GDK_BACKEND=x11) each changed nothing, and
# every attempt so far has guessed at a cause instead of measuring one.
#
# This run measures. It answers three things the CI job cannot:
#   1. Does the toplevel EVER map, or is it simply never created? (poll, don't
#      sample once at 20s)
#   2. Do WebKitGTK's helper processes start at all? If WebKitWebProcess is
#      missing, the webview died before the window could be shown.
#   3. What does the app actually print? CI throws its output away.
#
# It also tries the two harness shapes side by side — a manually-started Xvfb
# (what CI does) and `xvfb-run` — so "the harness starts X wrong" is ruled in or
# out rather than assumed.
#
# Delete this file once the answer is recorded in Live-To-Do-List.md.
name: Linux render spike

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    name: Why does the Linux toplevel never map?
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/linux-deps
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Diagnostic tooling
        run: |
          sudo apt-get update
          # libgl1-mesa-dri is llvmpipe, the SOFTWARE rasteriser. The first spike
          # found the actual cause: the app prints
          #   libEGL warning: DRI3 error: Could not get DRI3 device
          # and no WebKitWebProcess ever starts. WebKitGTK needs a working
          # EGL/GL context; a bare Xvfb has no DRI3 and no GPU, so the web
          # process dies before a window can exist. The absent toplevel was a
          # symptom, not the problem. mesa-utils supplies eglinfo/glxinfo so the
          # probe can prove GL works before blaming the app again.
          sudo apt-get install -y xvfb imagemagick xdotool x11-utils openbox procps \
            libgl1-mesa-dri libglx-mesa0 mesa-utils

      - name: Build
        run: npm run tauri -- build --debug --no-bundle

      - name: Probe — manual Xvfb (what CI does today)
        run: |
          set +e
          mkdir -p spike
          setsid Xvfb :99 -screen 0 1600x1000x24 >spike/xvfb.log 2>&1 &
          sleep 3
          setsid openbox >spike/openbox.log 2>&1 &
          sleep 2
          export DISPLAY=:99
          echo "--- who is running ---"
          pgrep -a Xvfb || echo "NO Xvfb"
          pgrep -a openbox || echo "NO openbox (this is itself a finding)"

          # No sandbox / DMA-BUF workarounds here on purpose: this probe is the
          # BASELINE, so the next one can show whether they matter.
          ./target/debug/freally-teleprompt >spike/app-baseline.log 2>&1 &
          APP=$!
          for i in $(seq 1 15); do
            sleep 2
            echo "=== t+$((i*2))s ==="
            xwininfo -root -tree 2>&1 | sed -n '4,12p'
            pgrep -a WebKit || echo "(no WebKit processes)"
          done
          kill $APP 2>/dev/null
          echo "--- app said ---"
          cat spike/app-baseline.log
          pkill -f "Xvfb :99"; pkill openbox; sleep 1
          exit 0

      - name: Probe — software GL (llvmpipe), the fix the first spike pointed at
        run: |
          set +e
          mkdir -p spike
          # Force Mesa's software rasteriser. This is the whole hypothesis: give
          # WebKitGTK a GL context that does not need a GPU or DRI3.
          export LIBGL_ALWAYS_SOFTWARE=1
          export GALLIUM_DRIVER=llvmpipe
          export __GLX_VENDOR_LIBRARY_NAME=mesa
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1
          export GDK_BACKEND=x11
          xvfb-run -a --server-args="-screen 0 1600x1000x24" bash -c '
            setsid openbox >/dev/null 2>&1 &
            sleep 2
            echo "--- does GL work at all now? ---"
            glxinfo -B 2>&1 | head -8 || echo "glxinfo failed"
            ./target/debug/freally-teleprompt >spike/app-softgl.log 2>&1 &
            APP=$!
            for i in $(seq 1 10); do
              sleep 2
              echo "=== t+$((i*2))s ==="
              xwininfo -root -tree 2>&1 | sed -n "4,12p"
              pgrep -a WebKit || echo "(no WebKit processes)"
            done
            import -window root -screen spike/softgl.png 2>&1
            kill $APP 2>/dev/null
          '
          echo "--- app said ---"
          cat spike/app-softgl.log
          ls -la spike/ || true
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-render-spike
          path: spike/
          if-no-files-found: warn
