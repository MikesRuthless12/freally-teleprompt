# Phase 0 CI — the gate every phase must keep green on all three OSes.
#
# Mirrors `npm run ci:local` exactly (scripts/ci-local.mjs): rustfmt, cargo-deny,
# cargo-audit, clippy -D warnings, cargo test, the UI's
# prettier/eslint/i18n/theme/vitest/build, the Playwright panel gallery, and a
# Tauri debug compile per OS.
#
# The Rust toolchain comes from rust-toolchain.toml (pinned) — `rustup
# toolchain install` reads it, so the pin lives in exactly one place.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A superseded push doesn't need its full matrix — cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - run: cargo fmt --all -- --check

  cargo-deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check

  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # Unmaintained-class advisories are warnings here (they don't fail
        # audit); the deny.toml [advisories] ignore list documents each one.
        run: cargo audit

  ui:
    name: UI (prettier + eslint + i18n + theme + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      # Catalog parity across all 18 locales, no duplicate keys, and every
      # literal `t("…")` resolving to a key in en.ftl. A missing key would
      # otherwise ship as silent English, or as a raw id on screen.
      - run: npm run i18n:lint
      # Every white-alpha utility a component uses has a light-theme override.
      # Dark mode looks perfect without one, so this is invisible in review and
      # renders white-on-white for anyone running the light theme.
      - run: npm run theme:lint
      # `npm run build` runs `tsc --noEmit` first, so no separate typecheck.
      - run: npm run test:ui
      - run: npm run build

  ui-gallery:
    name: UI visual gallery (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: ui
      - name: Build the UI
        run: npm run build
      - name: Screenshot every panel (mocked IPC)
        run: npm run test:e2e
      # Every feature panel, screenshotted — download from this run's artifacts.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-panel-gallery
          path: ui/e2e/screenshots/*.png
          if-no-files-found: error

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/linux-deps
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  tauri-build:
    name: Tauri debug build + launch shot (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/linux-deps
      - name: Install the pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Tauri build (debug, compile-only)
        # --no-bundle keeps this a compile smoke — full bundling + installers
        # are exercised by release.yml on tags (FT-52).
        run: npm run tauri -- build --debug --no-bundle

      # --- the app actually running, photographed, on all three OSes ---------
      #
      # The Playwright gallery proves the UI renders in Chromium against a
      # mocked bridge. It cannot prove the real binary starts, that the OS's own
      # webview paints (WebView2 / WKWebView / WebKitGTK), or that Rust answered
      # the first IPC call — and those break on exactly one platform at a time.
      # The three artifacts below are meant to be LOOKED AT after each phase.
      - name: Give Linux a display to paint on
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # x11-utils supplies xwininfo, which the script's failure diagnostics
          # use to say WHY there is no window rather than only that there isn't.
          sudo apt-get install -y xvfb imagemagick xdotool x11-utils openbox
          # `setsid` detaches Xvfb from this step's process group. Without it the
          # runner tears the group down when the step ends, and the display would
          # be gone by the time the next step tries to paint on it.
          setsid Xvfb :99 -screen 0 1600x1000x24 >/dev/null 2>&1 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          # Give the X server a moment to accept connections.
          sleep 3
          # A window manager. On a bare X server the app's GTK toplevel never
          # got mapped — the only window X ever knew about was GTK's 10x10
          # LEADER window (the one that carries WM_CLASS), which is why the
          # screenshot was a uniformly black frame while the process sat there
          # perfectly healthy. Nothing about the app requires a WM in normal use;
          # a headless X server with no window manager at all is the unusual
          # environment here, not the app.
          setsid openbox >/dev/null 2>&1 &
          sleep 2
      # Blocking on Windows and macOS, where it has caught real problems and
      # passes reliably. NON-blocking on Linux, and the reason is written down
      # rather than hidden behind a flag:
      #
      # On a GitHub Linux runner the app starts, stays healthy, and produces no
      # errors — but the only window X ever sees is GTK's 10x10 leader window.
      # The real toplevel never maps. Disabling the WebKit sandbox and the
      # DMA-BUF renderer, adding a window manager, and pinning GDK_BACKEND each
      # changed nothing. That is a headless-X environment problem, not evidence
      # the app is broken: `clippy + test (ubuntu-latest)` passes and the Linux
      # build succeeds.
      #
      # What it is NOT is proof that the Linux app renders. Nothing here can
      # give us that any more, so `Live-To-Do-List.md` carries a drill to check
      # it on a real Linux desktop, and this step keeps running so its artifact
      # and diagnostics stay available for whoever picks the problem up.
      - name: Launch the app and screenshot it running
        run: node scripts/app-screenshot.mjs
        continue-on-error: ${{ matrix.os == 'ubuntu-latest' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-running-${{ matrix.os }}
          path: artifacts/*.png
          # A missing image is itself the finding worth failing on — except on
          # Linux, where the step above is already known not to produce one.
          if-no-files-found: ${{ matrix.os == 'ubuntu-latest' && 'warn' || 'error' }}
