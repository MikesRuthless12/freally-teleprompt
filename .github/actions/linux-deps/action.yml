name: Linux prerequisites
description: >
  The apt packages every Linux job needs — Tauri v2's webview/gtk stack, the
  speech-dispatcher headers the FT-16 read-aloud fallback shells out to, the
  appindicator library the system-tray icon links against, and the ALSA dev
  headers cpal links for FT-31 microphone capture (macOS/Windows use
  CoreAudio/WASAPI and need no extra package). Shared by ci.yml and release.yml
  so the list can never drift between them.
runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
          libxdo-dev libssl-dev \
          libayatana-appindicator3-dev \
          libasound2-dev
